name: Build and deploy Pages

on:
  push:
    branches: [ main, master ]
  schedule:
    - cron: '0 * * * *' # hourly
  workflow_dispatch: {}

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'

      - name: Install deps (optional)
        run: |
          python -m pip install --upgrade pip
          python -m pip install supabase numpy

      - name: Fetch results from Supabase
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          python scripts/fetch_results_from_supabase.py

      - name: Generate market odds JSON
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          python scripts/generate_market_odds.py --out market_odds.json --iters 2000000 --vig 0.30

      - name: Prepare public folder
        run: |
          mkdir -p public
          # ensure there's at least one dotfile so publisher cp globs don't fail
          touch public/.placeholder
          cp -r index.html classifica.html stats.html sisal.html posts.html post.html regolamento.html login.html profilo.html admin.html admin-post.html css js data risultati csl_logo.png public/
          # copy the generated JSON explicitly
          cp -f market_odds.json public/

      - name: Deploy to GitHub Pages (gh-pages branch)
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./public
          publish_branch: gh-pages
          user_name: 'github-actions[bot]'
          user_email: '41898282+github-actions[bot]@users.noreply.github.com'
