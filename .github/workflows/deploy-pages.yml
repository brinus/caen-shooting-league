name: Build and deploy Pages

on:
  push:
    branches: [ main, master ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'

      - name: Install deps (optional)
        run: |
          python -m pip install --upgrade pip
          # add here any Python deps if needed

      - name: Run aggiorna.py to generate data
        run: |
          # If Supabase secrets are provided, fetch latest risultati into risultati/*.csv
          python scripts/fetch_results_from_supabase.py
          python scripts/aggiorna.py

      - name: Prepare public folder
        run: |
          mkdir -p public
          cp -r index.html classifica.html stats.html sisal.html posts.html post.html regolamento.html login.html profilo.html admin.html admin-post.html css js data risultati csl_logo.png public/ || true

      - name: Deploy to GitHub Pages (gh-pages branch)
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./public
          publish_branch: gh-pages
          user_name: 'github-actions[bot]'
          user_email: '41898282+github-actions[bot]@users.noreply.github.com'
